{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openwork-ee.secretName" . }}
  labels:
    {{- include "openwork-ee.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.databaseUrl }}: {{ .Values.secret.values.databaseUrl | quote }}
  {{ .Values.secret.keys.betterAuthSecret }}: {{ .Values.secret.values.betterAuthSecret | quote }}
  {{ .Values.secret.keys.denDbEncryptionKey }}: {{ .Values.secret.values.denDbEncryptionKey | quote }}
  {{ .Values.secret.keys.daytonaApiKey }}: {{ .Values.secret.values.daytonaApiKey | quote }}
  {{ .Values.secret.keys.polarAccessToken }}: {{ .Values.secret.values.polarAccessToken | quote }}
  {{ .Values.secret.keys.openRouterManagementApiKey }}: {{ .Values.secret.values.openRouterManagementApiKey | quote }}
  {{ .Values.secret.keys.inferenceAdminToken }}: {{ .Values.secret.values.inferenceAdminToken | quote }}
  {{ .Values.secret.keys.inferenceWebhookSecret }}: {{ .Values.secret.values.inferenceWebhookSecret | quote }}
  {{ .Values.secret.keys.emailFrom }}: {{ .Values.secret.values.emailFrom | quote }}
  {{ .Values.secret.keys.smtpHost }}: {{ .Values.secret.values.smtpHost | quote }}
  {{ .Values.secret.keys.smtpPort }}: {{ .Values.secret.values.smtpPort | quote }}
  {{ .Values.secret.keys.smtpUser }}: {{ .Values.secret.values.smtpUser | quote }}
  {{ .Values.secret.keys.smtpPass }}: {{ .Values.secret.values.smtpPass | quote }}
  {{ .Values.secret.keys.smtpSecure }}: {{ .Values.secret.values.smtpSecure | quote }}
  {{ .Values.secret.keys.githubConnectorAppClientSecret }}: {{ .Values.secret.values.githubConnectorAppClientSecret | quote }}
  {{ .Values.secret.keys.githubConnectorAppPrivateKey }}: {{ .Values.secret.values.githubConnectorAppPrivateKey | quote }}
  {{ .Values.secret.keys.githubConnectorAppWebhookSecret }}: {{ .Values.secret.values.githubConnectorAppWebhookSecret | quote }}
{{- end }}
