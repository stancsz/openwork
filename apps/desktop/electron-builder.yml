# IMPORTANT: appId intentionally matches the Tauri shell so both builds share
# the same macOS bundle identifier, keychain entries, Launchpad slot, and TCC
# permissions. In-place migration from Tauri to Electron depends on this.
appId: com.differentai.openwork
productName: OpenWork
directories:
  output: dist-electron
files:
  - electron/**/*
  - package.json
extraResources:
  - from: ../app/dist
    to: app-dist
asar: true
npmRebuild: false
afterPack: scripts/electron-after-pack.cjs
# electron-updater feed. Matches the existing release workflow's GitHub target
# so both Tauri (latest.json) and Electron (latest*.yml) can live on the same
# release assets during the migration window.
publish:
  - provider: github
    owner: different-ai
    repo: openwork
    releaseType: release
mac:
  icon: src-tauri/icons/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  extraResources:
    - from: src-tauri/sidecars
      to: sidecars
      filter:
        - opencode
        - opencode-aarch64-apple-darwin
        - opencode-x86_64-apple-darwin
        - openwork-server
        - openwork-server-aarch64-apple-darwin
        - openwork-server-x86_64-apple-darwin
        - opencode-router
        - opencode-router-aarch64-apple-darwin
        - opencode-router-x86_64-apple-darwin
        - openwork-orchestrator
        - openwork-orchestrator-aarch64-apple-darwin
        - openwork-orchestrator-x86_64-apple-darwin
        - chrome-devtools-mcp
        - chrome-devtools-mcp-aarch64-apple-darwin
        - chrome-devtools-mcp-x86_64-apple-darwin
        - versions.json
        - versions.json-aarch64-apple-darwin
        - versions.json-x86_64-apple-darwin
  target:
    - dmg
    - zip
linux:
  icon: src-tauri/icons/icon.png
  extraResources:
    - from: src-tauri/sidecars
      to: sidecars
      filter:
        - opencode
        - opencode-aarch64-unknown-linux-gnu
        - opencode-x86_64-unknown-linux-gnu
        - openwork-server
        - openwork-server-aarch64-unknown-linux-gnu
        - openwork-server-x86_64-unknown-linux-gnu
        - opencode-router
        - opencode-router-aarch64-unknown-linux-gnu
        - opencode-router-x86_64-unknown-linux-gnu
        - openwork-orchestrator
        - openwork-orchestrator-aarch64-unknown-linux-gnu
        - openwork-orchestrator-x86_64-unknown-linux-gnu
        - chrome-devtools-mcp
        - chrome-devtools-mcp-aarch64-unknown-linux-gnu
        - chrome-devtools-mcp-x86_64-unknown-linux-gnu
        - versions.json
        - versions.json-aarch64-unknown-linux-gnu
        - versions.json-x86_64-unknown-linux-gnu
  target:
    - AppImage
    - tar.gz
win:
  icon: src-tauri/icons/icon.ico
  extraResources:
    - from: src-tauri/sidecars
      to: sidecars
      filter:
        - opencode.exe
        - opencode-aarch64-pc-windows-msvc.exe
        - opencode-x86_64-pc-windows-msvc.exe
        - openwork-server.exe
        - openwork-server-aarch64-pc-windows-msvc.exe
        - openwork-server-x86_64-pc-windows-msvc.exe
        - opencode-router.exe
        - opencode-router-aarch64-pc-windows-msvc.exe
        - opencode-router-x86_64-pc-windows-msvc.exe
        - openwork-orchestrator.exe
        - openwork-orchestrator-aarch64-pc-windows-msvc.exe
        - openwork-orchestrator-x86_64-pc-windows-msvc.exe
        - chrome-devtools-mcp.exe
        - chrome-devtools-mcp-aarch64-pc-windows-msvc.exe
        - chrome-devtools-mcp-x86_64-pc-windows-msvc.exe
        - versions.json
        - versions.json-aarch64-pc-windows-msvc.exe
        - versions.json-x86_64-pc-windows-msvc.exe
  target:
    - nsis
artifactName: openwork-${os}-${arch}-${version}.${ext}
